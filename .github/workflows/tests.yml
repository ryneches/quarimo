name: Tests

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# workflow_call lets packaging and release workflows gate on a clean test run:
#
#   jobs:
#     tests:
#       uses: ./.github/workflows/tests.yml
#
# All other triggers are for direct execution.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # ── Python fallback (no optional deps) ──────────────────────────────────
  # Verifies that the pure-Python backend works with only the core install.
  # Numba and MLX tests are skipped; CUDA tests are skipped.
  python-fallback:
    name: Python fallback / ubuntu / 3.12
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (core only)
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest tests/ -m "not large_scale" -v

  # ── Linux (Python fallback + cpu-parallel) ───────────────────────────────
  linux:
    name: Linux / ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev + cpu-parallel)
        run: pip install -e ".[dev,parallel]"

      - name: Test
        run: pytest tests/ -m "not large_scale" -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          flags: linux
          fail_ci_if_error: false

  # ── macOS Apple Silicon (cpu-parallel + MLX Metal) ───────────────────────
  # macos-15 runs on M4 hardware; Metal GPU is accessible via Apple's
  # Virtualization Framework, so MLX tests run (not skipped).
  # CUDA tests are skipped (no NVIDIA GPU on Apple Silicon).
  macos-apple-silicon:
    name: macOS Apple Silicon (MLX) / 3.12
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (dev + cpu-parallel + MLX)
        run: pip install -e ".[dev,parallel,apple]"

      - name: Test
        run: pytest tests/ -m "not large_scale" -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: macos-mlx
          fail_ci_if_error: false
